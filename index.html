<!doctype html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/urban-favicon.png" sizes="32x32" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta

      name="description"

      content="Enjoy comfortable Connecticut car service with professional drivers and smooth airport transfers to JFK LGA and NYC. Safe rides for business and leisure travelers."

    />

    <title>Urban Elite Limo</title>

    <!-- Critical shell: avoids blank flash before app CSS loads -->

    <style>
      body{margin:0;background:#fff;font-family:'Space Grotesk',system-ui,sans-serif;position:relative}
      #root{min-height:100vh;position:relative;z-index:1}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Space Grotesk: site-wide typography -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />

    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

  </head>

  <body>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

  </body>
