<!doctype html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/urban-favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta

      name="description"

      content="Enjoy comfortable Connecticut car service with professional drivers and smooth airport transfers to JFK LGA and NYC. Safe rides for business and leisure travelers."

    />

    <title>Urban Elite Limo</title>

    <!-- Critical shell: avoids blank flash before app CSS loads -->

    <style>
      body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif;position:relative}
      #root{min-height:100vh;position:relative;z-index:1}
      @media (max-width:720px){body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter: desktop only — mobile uses system fonts for faster LCP -->

    <link
      rel="preload"
      as="style"
      media="(min-width: 721px)"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=optional"
      onload="this.onload=null;this.rel='stylesheet'"
    />

    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=optional"
        rel="stylesheet"
      />
    </noscript>

  </head>

  <body>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

  </body>

</html>
