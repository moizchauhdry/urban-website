# Nginx: files in urban-app/, public URL is connecticut-black-car-and-limo-service

location /urban-app/ {
    alias /var/www/urbanelitelimo/urban-app/;
}

location /connecticut-black-car-and-limo-service/ {
    rewrite ^ /urban-app/index.html last;
}

location /connecticut-black-car-and-limo-service {
    rewrite ^ /urban-app/index.html last;
}
